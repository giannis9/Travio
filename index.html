<html lang="en">
<head>

<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const C = {
  bg:"#F6F2EB",card:"#FFFFFF",border:"#E8E0D2",borderHover:"#C8B89A",
  text:"#1A1612",muted:"#7C756E",dim:"#B0A99E",
  blue:"#2563EB",blueSoft:"#EFF6FF",
  amber:"#C97D0A",amberSoft:"#FFFBEB",
  green:"#15803D",greenSoft:"#F0FDF4",
  red:"#DC2626",redSoft:"#FEF2F2",
  rose:"#E11D48",roseSoft:"#FFF1F2",
  violet:"#7C3AED",violetSoft:"#F5F3FF",
  teal:"#0891B2",tealSoft:"#F0F9FF",
  serif:"'Fraunces',Georgia,serif",
  sans:"'Plus Jakarta Sans',system-ui,sans-serif",
};
const VIBE_MAP={romantic:{accent:C.rose,soft:C.roseSoft},foodie:{accent:C.amber,soft:C.amberSoft},aesthetic:{accent:C.violet,soft:C.violetSoft},local_feel:{accent:C.teal,soft:C.tealSoft},hidden_gem:{accent:C.green,soft:C.greenSoft}};
const TIMING_MAP={book_now:{label:"Book Now ✓",color:C.green,soft:C.greenSoft},wait_week:{label:"Wait 1 Week",color:C.amber,soft:C.amberSoft},act_today:{label:"Act Today ⚡",color:C.red,soft:C.redSoft}};
const TICON={flight:"✈",eurostar:"🚄",train:"🚆"};

// ── AI via Netlify Function (no CORS issues) ─────────────────────────────────
async function ai(prompt, maxTokens=3000) {
  const key = sessionStorage.getItem("GROQ_KEY");
  if (!key) throw new Error("No API key");
  const res = await fetch("/api/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt, maxTokens, apiKey: key}),
  });
  const d = await res.json();
  if (!res.ok || d.error) throw new Error(d.error || `Error ${res.status}`);
  return JSON.parse(d.text || "{}");
}

// ── KEY SETUP ─────────────────────────────────────────────────────────────────
function KeySetup({ onSave }) {
  const [key, setKey] = useState("");
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState("");
  async function testAndSave() {
    if (!key.trim()) return;
    setTesting(true); setErr("");
    try {
      sessionStorage.setItem("GROQ_KEY", key.trim());
      const d = await ai('Return this JSON: {"ok":true,"msg":"Travio ready"}', 50);
      if (d.ok) onSave(key.trim());
      else throw new Error("Unexpected response");
    } catch(e) {
      setErr(e.message);
      sessionStorage.removeItem("GROQ_KEY");
    }
    setTesting(false);
  }
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontFamily:C.serif,fontStyle:"italic",fontSize:40,color:C.text,marginBottom:6}}>Travio</div>
      <div style={{fontFamily:C.sans,fontSize:13,color:C.muted,marginBottom:32,textAlign:"center"}}>AI Travel OS · 100% Free</div>
      <div style={{background:C.card,borderRadius:16,padding:28,border:`1px solid ${C.border}`,width:"100%",maxWidth:380}}>
        <div style={{fontFamily:C.sans,fontSize:15,fontWeight:600,color:C.text,marginBottom:16}}>🚀 Σύνδεση με Groq AI</div>
        <div style={{background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:10,padding:"12px 14px",marginBottom:20}}>
          <div style={{fontFamily:C.sans,fontSize:12,color:C.green,fontWeight:600,marginBottom:6}}>✓ Εντελώς δωρεάν · Χωρίς πιστωτική κάρτα</div>
          <div style={{fontFamily:C.sans,fontSize:11,color:C.muted,lineHeight:1.7}}>
            1. Πήγαινε στο <strong style={{color:C.text}}>console.groq.com</strong><br/>
            2. Sign up (με Google)<br/>
            3. Κλίκ <strong style={{color:C.text}}>"API Keys"</strong> → <strong style={{color:C.text}}>"Create API Key"</strong><br/>
            4. Αντίγραψε και επικόλλησε παρακάτω
          </div>
        </div>
        <input
          value={key} onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&testAndSave()}
          placeholder="gsk_..."
          style={{width:"100%",background:C.bg,border:`1px solid ${err?C.red:C.border}`,borderRadius:10,padding:"12px 14px",fontSize:13,fontFamily:C.sans,color:C.text,marginBottom:12,boxSizing:"border-box",outline:"none"}}
        />
        {err && <div style={{fontSize:12,color:C.red,fontFamily:C.sans,marginBottom:12,background:C.redSoft,padding:"10px 12px",borderRadius:8,lineHeight:1.5}}>❌ {err}</div>}
        <button onClick={testAndSave} disabled={!key.trim()||testing}
          style={{width:"100%",background:!key.trim()||testing?"#ccc":C.green,border:"none",borderRadius:12,color:"#fff",padding:"14px",fontSize:14,fontFamily:C.sans,fontWeight:600,cursor:key.trim()&&!testing?"pointer":"default"}}>
          {testing?"Testing key...":"Start Travio →"}
        </button>
      </div>
    </div>
  );
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function topVibe(s){if(!s)return"aesthetic";return Object.entries(s).sort((a,b)=>b[1]-a[1])[0]?.[0]||"aesthetic";}
function huntToTrip(dest,wk){return{city:dest.city,country:dest.country,tagline:dest.one_liner,transport_type:dest.transport_type,is_greek:dest.is_greek,nights:2,outbound:{from:dest.from_airport,departs:dest.departs_fri,arrives:dest.arrives_city,price_pp:dest.flight_pp},return:{departs:dest.returns_sun,arrives:dest.arrives_london,price_pp:dest.flight_pp},hotel:{name:`${dest.city} boutique hotel`,type:"boutique",neighbourhood:"City centre",price_per_night:dest.hotel_night_pp*2},vibe_scores:{romantic:7,foodie:7,aesthetic:7,local_feel:7,hidden_gem:7},budget_2days:{transport:dest.flight_pp*4,hotel:dest.hotel_night_pp*4,food:Math.round(dest.total_2pax*0.2),activities:Math.round(dest.total_2pax*0.1),transport_local:Math.round(dest.total_2pax*0.05),total:dest.total_2pax},escape_score:dest.escape_score,why_this_weekend:dest.one_liner,hidden_gem_tip:"",top_vibes:dest.vibe_tags||[],timing:dest.timing};}
function Badge({label,color,soft,small}){return <span style={{display:"inline-flex",fontSize:small?10:11,fontFamily:C.sans,color,background:soft,border:`1px solid ${color}33`,borderRadius:20,padding:small?"2px 8px":"4px 10px",whiteSpace:"nowrap",fontWeight:500}}>{label}</span>;}
function TimingBadge({signal,small}){const t=TIMING_MAP[signal];if(!t)return null;return <Badge label={t.label} color={t.color} soft={t.soft} small={small}/>;}
function ScoreBar({label,value,color}){return(<div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.muted,fontFamily:C.sans,textTransform:"capitalize"}}>{label.replace("_"," ")}</span><span style={{fontSize:12,color,fontWeight:600,fontFamily:C.sans}}>{value}</span></div><div style={{height:4,background:C.border,borderRadius:99}}><div style={{height:4,width:`${value*10}%`,background:color,borderRadius:99}}/></div></div>);}
function Loader({text,sub}){return(<div style={{padding:"56px 24px",textAlign:"center"}}><div style={{fontSize:16,fontFamily:C.serif,fontStyle:"italic",color:C.muted,marginBottom:6}}>{text}</div><div style={{fontSize:12,color:C.dim,fontFamily:C.sans}}>{sub}</div></div>);}
function ErrBox({msg,onRetry}){return(<div style={{margin:"0 0 16px",background:C.redSoft,border:`1px solid ${C.red}33`,borderRadius:12,padding:16}}><div style={{fontSize:12,color:C.red,fontFamily:C.sans,marginBottom:10,lineHeight:1.5}}>❌ {msg}</div><button onClick={onRetry} style={{fontSize:12,fontFamily:C.sans,background:C.red,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer"}}>Try Again</button></div>);}

// ── PROMPTS ───────────────────────────────────────────────────────────────────
const HUNTER_P=`Find 4 cheapest upcoming weekend escapes from London. Outbound Friday after 18:30 from LHR/LGW/LCY or Eurostar. Return Sunday 20:00-23:30. Include 1 Greek option (Athens or Thessaloniki).
Return JSON: {"weekends":[{"label":"Fri 6 Jun – Sun 8 Jun","depart_date":"2025-06-06","cheapest_total_2pax":320,"value_tier":"great","why_cheap":"Low-cost carrier sale this week","destinations":[{"city":"Porto","country":"Portugal","is_greek":false,"transport_type":"flight","from_airport":"LGW","departs_fri":"19:30","arrives_city":"22:00","returns_sun":"20:30","arrives_london":"22:45","flight_pp":45,"hotel_night_pp":60,"total_2pax":320,"escape_score":88,"vibe_tags":["river views","natural wine","cobblestone"],"one_liner":"Sun-drenched city with the best wine bars in Europe","timing":{"signal":"book_now","reason":"Prices rising next week"}}]}]}
Sort weekends cheapest first. Use realistic 2025 GBP prices.`;

const WEEKEND_P=`Find 6 weekend escapes from London departing this Friday after 18:30 (LHR/LGW/LCY or Eurostar) returning Sunday 20:00-23:30. Include 1 Greek option.
Return JSON: {"trips":[{"city":"Lisbon","country":"Portugal","tagline":"Golden light and pasteis","transport_type":"flight","is_greek":false,"outbound":{"from":"LGW","departs":"19:15","arrives":"22:30","price_pp":65},"return":{"departs":"20:45","arrives":"23:00","price_pp":70},"hotel":{"name":"Casa do Bairro","type":"boutique","neighbourhood":"Alfama","price_per_night":95},"vibe_scores":{"romantic":8,"foodie":9,"aesthetic":8,"local_feel":7,"hidden_gem":6},"budget_2days":{"transport":270,"hotel":190,"food":120,"activities":60,"transport_local":30,"total":670},"escape_score":87,"why_this_weekend":"Perfect weather window, low crowds this weekend","hidden_gem_tip":"Try Taberna da Rua das Flores for lunch — no tourists","top_vibes":["golden light","pasteis","miradouros"],"timing":{"signal":"book_now","confidence":85,"reason":"Prices up 20% next weekend"}}]}`;

const CUSTOM_P=(from,dest,dep,ret,pax,budget)=>`Find 5 trip options from ${from} to ${dest||"best destinations"}, departing ${dep} returning ${ret}, ${pax} travellers, max £${budget}pp.
Return JSON: {"trips":[{"city":"Barcelona","country":"Spain","tagline":"Beach meets architecture","transport_type":"flight","is_greek":false,"nights":3,"outbound":{"from":"LHR","departs":"07:30","arrives":"11:00","price_pp":89,"date":"${dep}"},"return":{"departs":"18:30","arrives":"20:00","price_pp":95,"date":"${ret}"},"hotel":{"name":"Hotel Arts","type":"design","neighbourhood":"Barceloneta","price_per_night":140},"vibe_scores":{"romantic":7,"foodie":9,"aesthetic":8,"local_feel":6,"hidden_gem":5},"budget_total":{"transport":370,"hotel":420,"food":200,"activities":120,"transport_local":50,"total":1160},"escape_score":85,"why_go":"Perfect weather, Primavera Sound festival this weekend","hidden_gem_tip":"Skip La Boqueria, go to Mercat de l'Abaceria instead","top_vibes":["beach","tapas","architecture"],"timing":{"signal":"wait_week","confidence":70,"reason":"Prices may drop mid-week"}}]}`;

const GREECE_P=`Find cheapest upcoming weekends London to Athens and Thessaloniki, next 8 weekends.
Return JSON: {"athens":[{"weekend_label":"Fri 6 Jun – Sun 8 Jun","price_pp_return":89,"airline":"EasyJet","departs_fri":"20:15","returns_sun":"21:30","price_signal":"book_now","hotel_avg_pp":55,"total_pp":254,"crowd_level":"low","weather":"27°C sunny"}],"thessaloniki":[{"weekend_label":"Fri 6 Jun – Sun 8 Jun","price_pp_return":105,"airline":"Ryanair","departs_fri":"19:45","returns_sun":"20:50","price_signal":"wait_week","hotel_avg_pp":45,"total_pp":240,"crowd_level":"low","weather":"25°C sunny"}]}
8 weekends each. Realistic 2025 GBP prices.`;

const IT_P=(city,country,vibes)=>`Create a vivid 2-night itinerary for ${city}, ${country}. Arriving Friday evening (~22:00), departing Sunday (~18:30). Focus on: ${vibes}.
Return JSON: {"days":[{"label":"Friday Night","items":[{"time":"22:30","title":"Taberna do Largo","desc":"A candlelit wine bar hidden in a 16th-century courtyard — order the house white and the octopus","type":"bar"}]},{"label":"Saturday","items":[{"time":"09:00","title":"Pastelaria Versailles","desc":"Art deco cafe serving the city's best pastel de nata since 1922","type":"cafe"}]},{"label":"Sunday","items":[{"time":"10:00","title":"LX Factory Sunday Market","desc":"Browse vintage finds and local design in this converted industrial space","type":"explore"}]}]}
Friday: 2 items. Saturday: 6 items. Sunday: 4 items. Use real, specific venue names.`;

const TIMING_P=(route)=>`Analyse flight price timing for: ${route}. Should I book now or wait?
Return JSON: {"analysis":{"route":"${route}","current_price_pp":145,"historic_avg_pp":160,"lowest_seen_pp":89,"trend":"falling","signal":"wait_week","confidence":72,"recommendation":"Prices are above average but falling. Wait 5-7 days before booking.","reasons":["Prices typically drop 3 weeks before departure","No major events this weekend driving demand","Competitor routes still have availability"],"airline_sales":"EasyJet sale expected Tuesday, Ryanair mid-week drops common","best_booking_window":"2-3 weeks before for best prices on this route"}}`;

// ── TRIP CARD ─────────────────────────────────────────────────────────────────
function TripCard({trip,onSelect}){
  const tv=topVibe(trip.vibe_scores);
  const vm=trip.is_greek?{accent:C.amber,soft:C.amberSoft}:(VIBE_MAP[tv]||VIBE_MAP.aesthetic);
  const budget=trip.budget_2days?.total||trip.budget_total?.total||0;
  const sc=trip.escape_score>=85?C.green:trip.escape_score>=70?C.amber:C.rose;
  return(
    <div onClick={()=>onSelect(trip)} style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:12,transition:"transform 0.15s,box-shadow 0.2s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.11)";}}

      <div style={{height:5,background:vm.accent}}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div style={{flex:1,marginRight:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontSize:13}}>{TICON[trip.transport_type]||"✈"}</span>
              <span style={{fontSize:10,color:C.muted,fontFamily:C.sans,letterSpacing:"0.06em",textTransform:"uppercase"}}>{trip.outbound?.from}</span>
              {trip.is_greek&&<Badge label="🇬🇷" color={C.amber} soft={C.amberSoft} small/>}
            </div>
            <div style={{fontSize:26,fontFamily:C.serif,fontStyle:"italic",color:C.text,lineHeight:1.1,marginBottom:2}}>{trip.city}</div>
            <div style={{fontSize:12,color:C.muted,fontFamily:C.sans}}>{trip.country}</div>

          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:22,fontFamily:C.serif,color:sc,fontWeight:500,lineHeight:1}}>{trip.escape_score}</div>
            <div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginTop:2}}>SCORE</div>

        </div>
        <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
          <div><div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginBottom:2}}>FRI OUT</div><div style={{fontSize:14,fontFamily:C.sans,fontWeight:600,color:C.text}}>{trip.outbound?.departs}</div><div style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>→ {trip.outbound?.arrives}</div></div>
          <div style={{width:1,background:C.border}}/>
          <div style={{textAlign:"right"}}><div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginBottom:2}}>SUN BACK</div><div style={{fontSize:14,fontFamily:C.sans,fontWeight:600,color:C.text}}>{trip.return?.departs}</div><div style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>→ {trip.return?.arrives}</div></div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>{(trip.top_vibes||[]).map((v,i)=>(<span key={i} style={{fontSize:11,color:C.muted,background:C.bg,border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 10px",fontFamily:C.sans}}>{v}</span>))}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.border}`,paddingTop:14}}>

          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}><TimingBadge signal={trip.timing?.signal}/><span style={{fontSize:11,color:C.muted,fontFamily:C.sans}}>see escape →</span></div>
        </div>
      </div>
    </div>
  );
}

// ── TRIP DETAIL ───────────────────────────────────────────────────────────────
function TripDetail({trip,onBack}){
  const [tab,setTab]=useState("overview");
  const [itinerary,setItinerary]=useState(null);
  const [itLoading,setItLoading]=useState(false);
  const [itErr,setItErr]=useState("");
  const tv=topVibe(trip.vibe_scores);
  const vm=trip.is_greek?{accent:C.amber,soft:C.amberSoft}:(VIBE_MAP[tv]||VIBE_MAP.aesthetic);
  const budget=trip.budget_2days||trip.budget_total||{};
  const TYPE_COL={food:C.amber,bar:C.rose,walk:C.teal,cafe:C.amber,culture:C.violet,activity:C.blue,hotel:C.teal,explore:C.green};
  async function loadIt(){
    setItLoading(true);setItErr("");
    try{const d=await ai(IT_P(trip.city,trip.country,(trip.top_vibes||[]).join(", ")),2000);setItinerary(d.days||[]);}
    catch(e){setItErr(e.message);}
    setItLoading(false);
  }
  useEffect(()=>{if(tab==="itinerary"&&!itinerary)loadIt();},[tab]);
  return(
    <div style={{background:C.bg,minHeight:"100%",fontFamily:C.sans}}>
      <div style={{background:vm.accent,padding:"20px 20px 28px"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.25)",border:"none",borderRadius:20,color:"#fff",cursor:"pointer",padding:"6px 14px",fontSize:12,fontFamily:C.sans,marginBottom:20}}>← back</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginBottom:4}}>{TICON[trip.transport_type]||"✈"} {trip.transport_type} · {trip.outbound?.from}</div>
            <div style={{fontSize:36,fontFamily:C.serif,fontStyle:"italic",color:"#fff",lineHeight:1.05}}>{trip.city}</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.8)",marginTop:3}}>{trip.country}</div>
          </div>
          <div style={{textAlign:"right"}}><div style={{fontSize:30,fontFamily:C.serif,color:"#fff",fontWeight:500}}>£{budget.total}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>2 people</div></div>
        </div>
      </div>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",position:"sticky",top:0,zIndex:10}}>
        {["overview","itinerary","budget"].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",borderBottom:tab===t?`2px solid ${vm.accent}`:"2px solid transparent",color:tab===t?vm.accent:C.muted,cursor:"pointer",padding:"14px 8px",fontSize:12,fontFamily:C.sans,fontWeight:tab===t?600:400,textTransform:"capitalize"}}>{t}</button>))}
      </div>
      <div style={{padding:"24px 20px"}}>
        {tab==="overview"&&(<div>
          <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:12,textTransform:"uppercase"}}>Flights</div>
            {[["OUT",trip.outbound,vm.accent],["RETURN",trip.return,C.teal]].map(([lbl,leg,col])=>(<div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:lbl==="OUT"?`1px solid ${C.border}`:"none"}}><div><div style={{fontSize:10,color:C.dim,marginBottom:3}}>{lbl}{lbl==="OUT"?` · ${trip.outbound?.from}`:""}</div><div style={{fontSize:15,fontFamily:C.sans,fontWeight:600,color:C.text}}>{leg?.departs} → {leg?.arrives}</div></div><div style={{fontSize:15,color:col,fontWeight:600}}>£{leg?.price_pp}<span style={{fontSize:10,fontWeight:400,color:C.muted}}>pp</span></div></div>))}
          </div>
          <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>Hotel</div>
            <div style={{fontSize:18,fontFamily:C.serif,fontStyle:"italic",color:C.text,marginBottom:3}}>{trip.hotel?.name}</div>
            <div style={{fontSize:12,color:C.muted}}>{trip.hotel?.type} · {trip.hotel?.neighbourhood}</div>
            <div style={{fontSize:15,color:vm.accent,fontWeight:600,marginTop:8}}>£{trip.hotel?.price_per_night}<span style={{fontSize:11,fontWeight:400,color:C.muted}}>/night</span></div>
          </div>

      {!loading&&!err&&analysis&&(<div style={{background:C.bg,borderRadius:12,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div style={{fontSize:14,fontFamily:C.serif,fontStyle:"italic"}}>{analysis.route}</div><TimingBadge signal={analysis.signal}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>{[["Current",`£${analysis.current_price_pp}`,C.text],["30d Avg",`£${analysis.historic_avg_pp}`,C.muted],["Lowest",`£${analysis.lowest_seen_pp}`,C.green]].map(([l,v,col])=>(<div key={l} style={{background:C.card,borderRadius:8,padding:10,textAlign:"center"}}><div style={{fontSize:9,color:C.dim,marginBottom:4,fontFamily:C.sans}}>{l}</div><div style={{fontSize:15,fontFamily:C.serif,color:col}}>{v}</div></div>))}</div>
        <div style={{fontSize:13,color:C.text,fontFamily:C.sans,lineHeight:1.6,marginBottom:8}}>{analysis.recommendation}</div>
        {(analysis.reasons||[]).map((r,i)=>(<div key={i} style={{fontSize:12,color:C.muted,padding:"5px 0",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,fontFamily:C.sans}}><span style={{color:C.violet}}>›</span>{r}</div>))}
        {analysis.airline_sales&&<div style={{fontSize:12,color:C.amber,marginTop:10,padding:"10px",background:C.amberSoft,borderRadius:8,fontFamily:C.sans}}>🔖 {analysis.airline_sales}</div>}
      </div>)}
    </div>
    <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:13,fontFamily:C.sans,fontWeight:600,color:C.text,marginBottom:14}}>Set Price Alert</div>
      <div style={{marginBottom:12}}><input value={route} onChange={e=>setRoute(e.target.value)} placeholder="e.g. LHR → Athens" style={inp}/></div>
      <div style={{marginBottom:16}}><div style={{fontSize:10,color:C.dim,fontFamily:C.sans,marginBottom:6,textTransform:"uppercase"}}>Alert below · £{threshold}pp</div><input type="range" min={40} max={400} step={5} value={threshold} onChange={e=>setThreshold(+e.target.value)} style={{width:"100%"}}/></div>
      <button onClick={()=>{if(!route)return;setAlerts(p=>[{id:Date.now(),route,threshold,created:new Date().toLocaleDateString()},...p]);setRoute("");}} disabled={!route} style={{width:"100%",background:!route?C.border:C.rose,border:"none",borderRadius:12,color:!route?C.muted:"#fff",padding:"13px",fontSize:13,fontFamily:C.sans,fontWeight:600,cursor:"pointer",opacity:!route?0.5:1}}>🔔 Add Alert</button>
    </div>
    {alerts.length>0&&(<div><div style={{fontSize:10,color:C.dim,fontFamily:C.sans,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Active · {alerts.length}</div>{alerts.map(a=>(<div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontFamily:C.serif,fontStyle:"italic",color:C.text}}>{a.route}</div><div style={{fontSize:11,color:C.muted,fontFamily:C.sans}}>Below £{a.threshold}pp · {a.created}</div></div><button onClick={()=>setAlerts(p=>p.filter(x=>x.id!==a.id))} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:20}}>×</button></div>))}
    </div>)}
  </div>);
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function TravioApp(){
  const [apiKey,setApiKey]=useState(sessionStorage.getItem("GROQ_KEY")||"");
  const [tab,setTab]=useState("hunt");
  const [selected,setSelected]=useState(null);
  const [alerts,setAlerts]=useState([]);
  if(!apiKey) return <KeySetup onSave={k=>{sessionStorage.setItem("GROQ_KEY",k);setApiKey(k);}}/>;
  if(selected) return(<div style={{background:C.bg,minHeight:"100%"}}><TripDetail trip={selected} onBack={()=>setSelected(null)}/></div>);
  const TABS=[{id:"hunt",icon:"🎯",label:"Hunt"},{id:"weekend",icon:"✈",label:"Weekend"},{id:"custom",icon:"📅",label:"Plan"},{id:"greece",icon:"🏛",label:"Greece"},{id:"alerts",icon:"🔔",label:"Alerts"}];
  return(
    <div style={{background:C.bg,minHeight:"100%",fontFamily:C.sans}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><div style={{fontSize:10,color:C.dim,letterSpacing:"0.15em",fontFamily:C.sans,textTransform:"uppercase",marginBottom:2}}>AI Travel OS</div><div style={{fontSize:26,fontFamily:C.serif,fontStyle:"italic",color:C.text}}>Travio</div></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:C.green}}/>
            <span style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>Live</span>
            <button onClick={()=>{sessionStorage.removeItem("GROQ_KEY");setApiKey("");}} style={{fontSize:10,background:"none",border:`1px solid ${C.border}`,borderRadius:10,color:C.dim,cursor:"pointer",padding:"3px 8px",fontFamily:C.sans}}>key</button>
          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto"}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flexShrink:0,background:"none",border:"none",borderBottom:tab===t.id?`2px solid ${C.text}`:"2px solid transparent",color:tab===t.id?C.text:C.muted,cursor:"pointer",padding:"10px 12px 12px",fontFamily:C.sans,fontWeight:tab===t.id?600:400,fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:16}}>{t.icon}</span><span style={{fontSize:10,whiteSpace:"nowrap"}}>{t.label}</span></button>))}
        </div>
      </div>
      {tab==="hunt"&&<AutoHunterTab onSelect={setSelected}/>}
      {tab==="weekend"&&<WeekendTab onSelect={setSelected}/>}
      {tab==="custom"&&<CustomTripTab onSelect={setSelected}/>}
      {tab==="greece"&&<GreeceTab/>}
      {tab==="alerts"&&<AlertsTab alerts={alerts} setAlerts={setAlerts}/>}
      <div style={{borderTop:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",justifyContent:"space-between",background:C.card,marginTop:8}}>
        <span style={{fontSize:10,color:C.dim,fontFamily:C.sans}}>Groq AI · Free · No data stored</span>
        <span style={{fontSize:10,color:C.dim,fontFamily:C.sans}}>Travio</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TravioApp));
</script>
</body>
</html>
