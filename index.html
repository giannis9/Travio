<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="theme-color" content="#F6F2EB"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Travio"/>
  <title>Travio — AI Travel OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#F6F2EB;-webkit-font-smoothing:antialiased}#root{max-width:480px;margin:0 auto;min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;

// ── THEME ─────────────────────────────────────────────────────────────────────
const C={bg:"#F6F2EB",card:"#FFFFFF",border:"#E8E0D2",borderHover:"#C8B89A",text:"#1A1612",muted:"#7C756E",dim:"#B0A99E",blue:"#2563EB",blueSoft:"#EFF6FF",amber:"#C97D0A",amberSoft:"#FFFBEB",green:"#15803D",greenSoft:"#F0FDF4",red:"#DC2626",redSoft:"#FEF2F2",rose:"#E11D48",roseSoft:"#FFF1F2",violet:"#7C3AED",violetSoft:"#F5F3FF",teal:"#0891B2",tealSoft:"#F0F9FF",serif:"'Fraunces',Georgia,serif",sans:"'Plus Jakarta Sans',system-ui,sans-serif"};
const VIBE={romantic:{a:C.rose,s:C.roseSoft},foodie:{a:C.amber,s:C.amberSoft},aesthetic:{a:C.violet,s:C.violetSoft},local_feel:{a:C.teal,s:C.tealSoft},hidden_gem:{a:C.green,s:C.greenSoft}};
const TM={book_now:{l:"Book Now ✓",c:C.green,s:C.greenSoft},wait_week:{l:"Wait 1 Week",c:C.amber,s:C.amberSoft},act_today:{l:"Act Today ⚡",c:C.red,s:C.redSoft}};
const TI={flight:"✈",eurostar:"🚄",train:"🚆"};

// ── API ───────────────────────────────────────────────────────────────────────
async function ai(prompt,maxTokens=3500){
  const r=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,maxTokens})});
  const d=await r.json();
  if(!r.ok||d.error)throw new Error(d.error||`Error ${r.status}`);
  try{return JSON.parse((d.text||"{}").replace(/```json|```/g,"").trim());}
  catch(e){throw new Error("Invalid AI response — try again");}
}
function go(url){if(!url)return;if(!url.startsWith("http"))url="https://"+url;window.open(url,"_blank");}
function tv(s){if(!s)return"aesthetic";return Object.entries(s).sort((a,b)=>b[1]-a[1])[0]?.[0]||"aesthetic";}
function vm(trip){return trip.is_greek?{a:C.amber,s:C.amberSoft}:(VIBE[tv(trip.vibe_scores)]||VIBE.aesthetic);}

// ── SMALL COMPONENTS ──────────────────────────────────────────────────────────
function Badge({l,c,s,sm}){return <span style={{display:"inline-flex",fontSize:sm?10:11,fontFamily:C.sans,color:c,background:s,border:`1px solid ${c}33`,borderRadius:20,padding:sm?"2px 8px":"4px 10px",whiteSpace:"nowrap",fontWeight:500}}>{l}</span>;}
function TMBadge({sig,sm}){const t=TM[sig];if(!t)return null;return <Badge l={t.l} c={t.c} s={t.s} sm={sm}/>;}
function Bar({label,v,c}){return(<div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:C.muted,fontFamily:C.sans,textTransform:"capitalize"}}>{label.replace("_"," ")}</span><span style={{fontSize:12,color:c,fontWeight:600,fontFamily:C.sans}}>{v}</span></div><div style={{height:4,background:C.border,borderRadius:99}}><div style={{height:4,width:`${v*10}%`,background:c,borderRadius:99}}/></div></div>);}
function Spin({text,sub}){return(<div style={{padding:"56px 24px",textAlign:"center"}}><div style={{fontSize:16,fontFamily:C.serif,fontStyle:"italic",color:C.muted,marginBottom:6}}>{text}</div><div style={{fontSize:12,color:C.dim,fontFamily:C.sans}}>{sub}</div></div>);}
function Err({msg,retry}){return(<div style={{margin:"0 0 16px",background:C.redSoft,border:`1px solid ${C.red}33`,borderRadius:12,padding:16}}><div style={{fontSize:12,color:C.red,fontFamily:C.sans,marginBottom:10,lineHeight:1.5}}>❌ {msg}</div><button onClick={retry} style={{fontSize:12,fontFamily:C.sans,background:C.red,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer"}}>Try Again</button></div>);}
function BookBtns({b}){if(!b)return null;return(<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>{b.flight_url&&<button onClick={()=>go(b.flight_url)} style={{fontSize:11,fontFamily:C.sans,fontWeight:600,background:C.blue,color:"#fff",border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer"}}>✈ {b.flight_site||"Book Flight"}</button>}{b.hotel_url&&<button onClick={()=>go(b.hotel_url)} style={{fontSize:11,fontFamily:C.sans,fontWeight:600,background:C.violet,color:"#fff",border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer"}}>🏨 {b.hotel_site||"Book Hotel"}</button>}</div>);}
function SubTabs({tabs,active,onSelect,color}){return(<div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>{tabs.map(([k,l])=>(<button key={k} onClick={()=>onSelect(k)} style={{fontSize:11,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontFamily:C.sans,fontWeight:500,border:"1px solid",borderColor:active===k?(color||C.blue)+"66":C.border,color:active===k?(color||C.blue):C.muted,background:active===k?(color||C.blue)+"15":C.card}}>{l}</button>))}
</div>);}

// ── TRIP CARD ─────────────────────────────────────────────────────────────────
function TCard({trip,onSelect,accent}){
  const v=vm(trip),bgt=trip.budget_2days?.total||trip.budget_total?.total||trip.budget_week?.total||0,sc=trip.escape_score>=85?C.green:trip.escape_score>=70?C.amber:C.rose,ac=accent||v.a;
  return(<div onClick={()=>onSelect(trip)} style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:12,transition:"transform .15s,box-shadow .2s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,.11)";}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,.06)";}}>
    <div style={{height:5,background:ac}}/>
    <div style={{padding:"18px 20px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div style={{flex:1,marginRight:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{fontSize:13}}>{TI[trip.transport_type]||"✈"}</span>
            <span style={{fontSize:10,color:C.muted,fontFamily:C.sans,letterSpacing:"0.06em",textTransform:"uppercase"}}>{trip.outbound?.from||trip.continent||""}</span>
            {trip.is_greek&&<Badge l="🇬🇷" c={C.amber} s={C.amberSoft} sm/>}
          </div>
          <div style={{fontSize:26,fontFamily:C.serif,fontStyle:"italic",color:C.text,lineHeight:1.1,marginBottom:2}}>{trip.city}</div>
          <div style={{fontSize:12,color:C.muted,fontFamily:C.sans}}>{trip.country}</div>
          <div style={{fontSize:12,color:C.dim,fontFamily:C.sans,marginTop:3,fontStyle:"italic"}}>{trip.tagline||trip.one_liner}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:22,fontFamily:C.serif,color:sc,fontWeight:500,lineHeight:1}}>{trip.escape_score}</div>
          <div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginTop:2}}>SCORE</div>
        </div>
      </div>
      {(trip.outbound?.departs||trip.return?.departs)&&<div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
        <div><div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginBottom:2}}>OUT{trip.outbound?.date?` · ${trip.outbound.date}`:""}</div><div style={{fontSize:14,fontFamily:C.sans,fontWeight:600,color:C.text}}>{trip.outbound?.departs||"—"}</div><div style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>→ {trip.outbound?.arrives||"—"}</div></div>
        <div style={{width:1,background:C.border}}/>
        <div style={{textAlign:"right"}}><div style={{fontSize:9,color:C.dim,fontFamily:C.sans,marginBottom:2}}>RETURN{trip.return?.date?` · ${trip.return.date}`:""}</div><div style={{fontSize:14,fontFamily:C.sans,fontWeight:600,color:C.text}}>{trip.return?.departs||"—"}</div><div style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>→ {trip.return?.arrives||"—"}</div></div>
      </div>}
      {trip.itinerary_highlights&&<div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{trip.itinerary_highlights.map((h,i)=><span key={i} style={{fontSize:10,color:C.muted,background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"2px 8px",fontFamily:C.sans}}>{h}</span>)}</div></div>}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>{(trip.top_vibes||[]).map((v2,i)=><span key={i} style={{fontSize:11,color:C.muted,background:C.bg,border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 10px",fontFamily:C.sans}}>{v2}</span>)}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        <div><div style={{fontSize:22,fontFamily:C.serif,color:C.text,fontWeight:500}}>£{bgt}</div><div style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>{trip.nights||2} nights · 2 people</div></div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}><TMBadge sig={trip.timing?.signal}/><span style={{fontSize:11,color:C.muted,fontFamily:C.sans}}>details →</span></div>
      </div>
    </div>
  </div>);
}

// ── TRIP DETAIL ───────────────────────────────────────────────────────────────
function TDetail({trip,onBack}){
  const [tab,setTab]=useState("overview");
  const [it,setIt]=useState(null);
  const [itL,setItL]=useState(false);
  const [itE,setItE]=useState("");
  const v=vm(trip),bgt=trip.budget_2days||trip.budget_total||trip.budget_week||{},nights=trip.nights||2;
  const TC={food:C.amber,bar:C.rose,walk:C.teal,cafe:C.amber,culture:C.violet,activity:C.blue,hotel:C.teal,explore:C.green};
  async function loadIt(){setItL(true);setItE("");try{const d=await ai(`Create a vivid ${nights}-night itinerary for ${trip.city}, ${trip.country}. Focus on: ${(trip.top_vibes||[]).join(", ")}. Return JSON: {"days":[{"label":string,"items":[{"time":string,"title":string,"desc":string,"type":"food|bar|walk|cafe|culture|activity|hotel"}]}]}. Use real venue names.`,2500);setIt(d.days||[]);}catch(e){setItE(e.message);}setItL(false);}
  useEffect(()=>{if(tab==="itinerary"&&!it)loadIt();},[tab]);
  return(<div style={{background:C.bg,minHeight:"100%",fontFamily:C.sans}}>
    <div style={{background:v.a,padding:"20px 20px 28px"}}>
      <button onClick={onBack} style={{background:"rgba(255,255,255,0.25)",border:"none",borderRadius:20,color:"#fff",cursor:"pointer",padding:"6px 14px",fontSize:12,fontFamily:C.sans,marginBottom:20}}>← back</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:4}}>{trip.continent||((TI[trip.transport_type]||"✈")+" "+(trip.outbound?.from||""))}</div>
          <div style={{fontSize:36,fontFamily:C.serif,fontStyle:"italic",color:"#fff",lineHeight:1.05}}>{trip.city}</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.8)",marginTop:3}}>{trip.country}</div>
        </div>
        <div style={{textAlign:"right"}}><div style={{fontSize:30,fontFamily:C.serif,color:"#fff",fontWeight:500}}>£{bgt.total}</div><div style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{nights} nights · 2 ppl</div></div>
      </div>
    </div>
    <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",position:"sticky",top:0,zIndex:10}}>
      {["overview","itinerary","budget"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",borderBottom:tab===t?`2px solid ${v.a}`:"2px solid transparent",color:tab===t?v.a:C.muted,cursor:"pointer",padding:"14px 8px",fontSize:12,fontFamily:C.sans,fontWeight:tab===t?600:400,textTransform:"capitalize"}}>{t}</button>)}
    </div>
    <div style={{padding:"24px 20px"}}>
      {tab==="overview"&&<div>
        <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:12,textTransform:"uppercase"}}>Transport</div>
          {[["OUT",trip.outbound,v.a],["RETURN",trip.return,C.teal]].map(([lbl,leg,col])=><div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:lbl==="OUT"?`1px solid ${C.border}`:"none"}}><div><div style={{fontSize:10,color:C.dim,marginBottom:3}}>{lbl}{leg?.date?` · ${leg.date}`:""}{lbl==="OUT"&&trip.outbound?.from?` · ${trip.outbound.from}`:""}{leg?.airline?` · ${leg.airline}`:""}</div><div style={{fontSize:15,fontFamily:C.sans,fontWeight:600,color:C.text}}>{leg?.departs||"—"} → {leg?.arrives||"—"}</div></div><div style={{fontSize:15,color:col,fontWeight:600}}>£{leg?.price_pp}<span style={{fontSize:10,fontWeight:400,color:C.muted}}>pp</span></div></div>)}
          <BookBtns b={trip.booking}/>
        </div>
        <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>Hotel</div>
          <div style={{fontSize:18,fontFamily:C.serif,fontStyle:"italic",color:C.text,marginBottom:3}}>{trip.hotel?.name}</div>
          <div style={{fontSize:12,color:C.muted}}>{trip.hotel?.type} · {trip.hotel?.neighbourhood}</div>
          <div style={{fontSize:15,color:v.a,fontWeight:600,marginTop:8}}>£{trip.hotel?.price_per_night}<span style={{fontSize:11,fontWeight:400,color:C.muted}}>/night</span></div>
          {trip.booking?.hotel_url&&<button onClick={()=>go(trip.booking.hotel_url)} style={{marginTop:10,fontSize:11,fontFamily:C.sans,fontWeight:600,background:C.violet,color:"#fff",border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer"}}>🏨 Book Hotel</button>}
        </div>
        {trip.itinerary_highlights&&<div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:12,textTransform:"uppercase"}}>Highlights</div>{trip.itinerary_highlights.map((h,i)=><div key={i} style={{fontSize:13,color:C.text,fontFamily:C.sans,padding:"6px 0",borderBottom:i<trip.itinerary_highlights.length-1?`1px solid ${C.border}`:"none",display:"flex",gap:10}}><span style={{color:v.a}}>›</span>{h}</div>)}</div>}
        <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:14,textTransform:"uppercase"}}>Vibe Scores</div>{Object.entries(trip.vibe_scores||{}).map(([k,val])=><Bar key={k} label={k} v={val} c={VIBE[k]?.a||v.a}/>)}</div>
        <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>Why Go</div><div style={{fontSize:14,color:C.text,fontFamily:C.serif,fontStyle:"italic",lineHeight:1.7}}>{trip.why_this_weekend||trip.why_go||trip.why}</div></div>
        <div style={{background:v.s,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${v.a}22`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",textTransform:"uppercase"}}>Price Signal</div><TMBadge sig={trip.timing?.signal}/></div><div style={{fontSize:13,color:C.text,fontFamily:C.sans,lineHeight:1.6}}>{trip.timing?.reason}</div></div>
        {trip.hidden_gem_tip&&<div style={{background:C.card,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.amber,letterSpacing:"0.1em",marginBottom:8,textTransform:"uppercase"}}>💎 Local Secret</div><div style={{fontSize:14,color:C.text,fontFamily:C.serif,fontStyle:"italic",lineHeight:1.7}}>{trip.hidden_gem_tip}</div></div>}
      </div>}
      {tab==="itinerary"&&<div>
        {itL&&<Spin text="Building your itinerary..." sub="Finding the best local spots..."/>}
        {itE&&<Err msg={itE} retry={loadIt}/>}
        {!itL&&!itE&&(it||[]).map((day,di)=><div key={di} style={{marginBottom:28}}><div style={{fontSize:16,fontFamily:C.serif,fontStyle:"italic",color:v.a,marginBottom:16}}>{day.label}</div>{(day.items||[]).map((item,ii)=><div key={ii} style={{display:"flex",gap:14,marginBottom:16}}><div style={{flexShrink:0,width:44,paddingTop:2}}><div style={{fontSize:11,color:C.dim,fontFamily:C.sans}}>{item.time}</div></div><div style={{width:3,background:TC[item.type]||C.border,borderRadius:99,flexShrink:0,minHeight:40}}/><div><div style={{fontSize:14,fontFamily:C.sans,fontWeight:600,color:C.text,marginBottom:3}}>{item.title}</div><div style={{fontSize:12,color:C.muted,fontFamily:C.sans,lineHeight:1.6}}>{item.desc}</div></div></div>)}</div>)}
      </div>}
      {tab==="budget"&&<div>
        <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:16,textTransform:"uppercase"}}>Full Breakdown · 2 People</div>
          {[["Flights",bgt.transport],[`Hotel (${nights} nights)`,bgt.hotel],["Food & Drink",bgt.food],["Activities",bgt.activities],["Local Transport",bgt.transport_local]].map(([l,a])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.muted,fontFamily:C.sans}}>{l}</span><span style={{fontSize:13,color:C.text,fontFamily:C.sans,fontWeight:500}}>£{a}</span></div>)}
          <div style={{display:"flex",justifyContent:"space-between",padding:"14px 0 4px"}}><span style={{fontSize:15,color:C.text,fontFamily:C.sans,fontWeight:600}}>Total</span><span style={{fontSize:20,color:v.a,fontFamily:C.serif,fontWeight:500}}>£{bgt.total}</span></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[["PER PERSON",`£${Math.round((bgt.total||0)/2)}`,"all-in"],["PER DAY",`£${Math.round((bgt.total||0)/2/nights)}`,"per person"]].map(([l,val,sub])=><div key={l} style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.border}`,textAlign:"center"}}><div style={{fontSize:10,color:C.dim,marginBottom:6,fontFamily:C.sans}}>{l}</div><div style={{fontSize:26,fontFamily:C.serif,color:v.a,fontWeight:500}}>{val}</div><div style={{fontSize:11,color:C.muted,fontFamily:C.sans,marginTop:3}}>{sub}</div></div>)}</div>
      </div>}
    </div>
  </div>);
}

// ── PROMPTS ───────────────────────────────────────────────────────────────────
const HUNTER_P=`Find 15 upcoming weekend escapes from London over the next 6 months. Friday after 18:30 departure. Return Sunday 20:00-23:30. Include 1+ Greek options. Mark is_budget:true on those under £500 for 2 people total. Sort cheapest first.
Return JSON:{"weekends":[{"label":str,"depart_date":str,"cheapest_total_2pax":num,"value_tier":"great"|"good"|"fair","is_budget":bool,"why_cheap":str,"destinations":[{"city":str,"country":str,"is_greek":bool,"transport_type":"flight"|"eurostar"|"train","from_airport":str,"departs_fri":str,"arrives_city":str,"returns_sun":str,"arrives_london":str,"flight_pp":num,"hotel_night_pp":num,"total_2pax":num,"escape_score":num,"vibe_tags":[str,str,str],"one_liner":str,"timing":{"signal":"book_now"|"wait_week"|"act_today","reason":str},"booking":{"flight_url":str,"flight_site":str,"hotel_url":str,"hotel_site":str}}]}]}
15 weekends, 3 destinations each. Realistic 2025-2026 GBP.`;

const SPONTANEOUS_P=`Find 5 genuine last-minute flight deals from London airports (LHR/LGW/LCY/STN) departing TODAY after 17:00 or TOMORROW before 12:00. Airlines often discount heavily to fill empty seats. Return same weekend.
Return JSON:{"deals":[{"city":str,"country":str,"airport_from":str,"departs":str,"arrives":str,"returns":str,"price_pp":num,"total_2pax":num,"hotel_night_pp":num,"total_with_hotel":num,"airline":str,"why_cheap":str,"vibe_tags":[str,str,str],"escape_score":num,"timing":{"signal":"act_today","reason":str},"booking":{"flight_url":str,"flight_site":str,"hotel_url":str}}]}
5 deals. Last-minute urgency. Realistic bargain prices.`;

const WEATHER_P=(weather,maxBudget)=>`Find 5 upcoming weekends from London where the destination has ${weather} weather AND total cost under £${maxBudget} for 2 people. Friday evening departure, Sunday return.

function MapTab(){
  const [visited,setVisited]=useState(()=>{try{return JSON.parse(localStorage.getItem("travio_map")||"[]");}catch{return [];}});
  const [cont,setCont]=useState("Europe");
  const [search,setSearch]=useState("");
  useEffect(()=>{try{localStorage.setItem("travio_map",JSON.stringify(visited));}catch{}},[visited]);
  const toggle=(c)=>setVisited(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c]);
  const total=Object.values(CONTINENTS).flat().length;
  const contCounts=Object.entries(CONTINENTS).map(([c,countries])=>({c,total:countries.length,done:countries.filter(co=>visited.includes(co)).length}));
  const allCountries=Object.values(CONTINENTS).flat().filter(c=>!search||c.toLowerCase().includes(search.toLowerCase()));
  const filtered=search?allCountries:(CONTINENTS[cont]||[]);

  return(<div style={{padding:"20px 16px"}}>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:26,fontFamily:C.serif,fontStyle:"italic",color:C.text,marginBottom:4}}>My Travel Map</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:C.sans,marginBottom:16}}>Track your adventures · {visited.length} of {total} countries</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[["🌍",visited.length,"countries"],["🗺",contCounts.filter(c=>c.done>0).length,"continents"],["📊",`${Math.round(visited.length/total*100)}%`,"of world"]].map(([ic,v2,l])=><div key={l} style={{background:C.card,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}><div style={{fontSize:20}}>{ic}</div><div style={{fontSize:20,fontFamily:C.serif,color:C.text,fontWeight:500}}>{v2}</div><div style={{fontSize:10,color:C.dim,fontFamily:C.sans}}>{l}</div></div>)}
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search any country..." style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,padding:"10px 14px",fontSize:13,fontFamily:C.sans,width:"100%",boxSizing:"border-box",marginBottom:12}}/>
      {!search&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
        {Object.entries(CONTINENTS).map(([k])=>{const info=contCounts.find(c=>c.c===k)||{done:0,total:0};return(<button key={k} onClick={()=>setCont(k)} style={{fontSize:10,borderRadius:20,padding:"4px 10px",cursor:"pointer",fontFamily:C.sans,fontWeight:500,border:"1px solid",borderColor:cont===k?C.blue:C.border,color:cont===k?C.blue:C.muted,background:cont===k?C.blueSoft:C.card}}>{k} {info.done}/{info.total}</button>);})}
      </div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      {filtered.map(country=>{
        const done=visited.includes(country);
        return(<button key={country} onClick={()=>toggle(country)} style={{background:done?C.greenSoft:C.card,border:`1px solid ${done?C.green+"55":C.border}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",fontFamily:C.sans,fontSize:12,color:done?C.green:C.text,textAlign:"left",fontWeight:done?600:400,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{done?"✓":"○"}</span>{country}
        </button>);
      })}
    </div>
    {visited.length>0&&<div style={{marginTop:20,background:C.card,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:10,color:C.dim,letterSpacing:"0.1em",marginBottom:12,textTransform:"uppercase"}}>Your Countries</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{visited.sort().map(c=><span key={c} style={{fontSize:11,color:C.green,background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:20,padding:"3px 9px",fontFamily:C.sans}}>{c}</span>)}</div>
    </div>}
  </div>);
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function TravioApp(){
  const [tab,setTab]=useState("hunt");
  const [selected,setSelected]=useState(null);

  if(selected) return <div style={{background:C.bg,minHeight:"100%"}}><TDetail trip={selected} onBack={()=>setSelected(null)}/></div>;

  const TABS=[{id:"hunt",icon:"🎯",l:"Hunt"},{id:"plan",icon:"✈",l:"Plan"},{id:"escapes",icon:"🌍",l:"Escapes"},{id:"tools",icon:"🛠",l:"Tools"},{id:"map",icon:"🗺",l:"My Map"}];

  return(<div style={{background:C.bg,minHeight:"100%",fontFamily:C.sans}}>
    <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{fontSize:10,color:C.dim,letterSpacing:"0.15em",fontFamily:C.sans,textTransform:"uppercase",marginBottom:2}}>AI Travel OS</div><div style={{fontSize:26,fontFamily:C.serif,fontStyle:"italic",color:C.text}}>Travio</div></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:C.green}}/><span style={{fontSize:10,color:C.muted,fontFamily:C.sans}}>Live</span></div>
      </div>
      <div style={{display:"flex",overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flexShrink:0,background:"none",border:"none",borderBottom:tab===t.id?`2px solid ${C.text}`:"2px solid transparent",color:tab===t.id?C.text:C.muted,cursor:"pointer",padding:"10px 12px 12px",fontFamily:C.sans,fontWeight:tab===t.id?600:400,fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:16}}>{t.icon}</span><span style={{fontSize:10,whiteSpace:"nowrap"}}>{t.l}</span></button>)}
      </div>
    </div>
    {tab==="hunt"&&<HuntTab onSelect={setSelected}/>}
    {tab==="plan"&&<PlanTab onSelect={setSelected}/>}
    {tab==="escapes"&&<EscapesTab onSelect={setSelected}/>}
    {tab==="tools"&&<ToolsTab/>}
    {tab==="map"&&<MapTab/>}
    <div style={{borderTop:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",justifyContent:"space-between",background:C.card,marginTop:8}}>
      <span style={{fontSize:10,color:C.dim,fontFamily:C.sans}}>Groq AI · Free · No data stored</span>
      <span style={{fontSize:10,color:C.dim,fontFamily:C.sans}}>Travio v3</span>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TravioApp));
</script>
</body>
</html>
